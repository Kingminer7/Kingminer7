<html>
  <head>
    <title>Quick Windows GDPS App Creator</title>
  </head>
  <body>
    <h1>Quick Windows GDPS App Creator</h1>
    <p>Made for 2.2</p>
    <form id="hex-edit-form">
        <input
        id="Windows"
        type="radio"
        name="type"
        value="Windows"
        checked
        hidden
      />
      <input
        id="Android"
        type="radio"
        name="type"
        value="Android"
      / hidden>
      <input
        id="iOS"
        type="radio"
        name="type"
        value="iOS"
      / hidden>
      <p>Android package modifying is not currently possible. Sorry Android users!</p>
      <p>I don't quite know iOS app packaging works. Sorry iOS users!</p><br />
      <br />
      <input type="file" id="file-input" /><br />
      <br />
      <input type="text" id="App Name" placeholder="App Name" /><br />
      <br />
      <input type="text" id="Server URL" placeholder="Server URL" /><br />
      <br />
      <input
        type="text"
        id="Package Name"
        placeholder="Package Name"
        disabled
      /><br />
      <br />
      <button type="submit">Create</button>

      <script>
        function downloadFile(contents) {
          var blob = new Blob([contents], { type: "application/octet-stream" });
          var url = URL.createObjectURL(blob);
          var link = document.createElement("a");
          link.href = url;
          link.download =
            document.getElementById("App Name").value +
            (document.getElementById("Windows").checked
              ? ".exe"
              : document.getElementById("Android").checked
              ? ".apk"
              : ".ipa");
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        }

        function editFile(contents, original, newUrl) {
          var uint8Array = new Uint8Array(contents);
          var originalBytes = textToBytes(original);
          var newUrlBytes = textToBytes(newUrl);

          for (
            var i = 0;
            i < uint8Array.length - originalBytes.length + 1;
            i++
          ) {
            if (compareArrays(uint8Array, originalBytes, i)) {
              replaceArray(uint8Array, newUrlBytes, i);
            }
          }

          var editedContents = uint8Array.buffer;
          downloadFile(editedContents);
        }

        function textToBytes(text) {
          var encoder = new TextEncoder();
          return encoder.encode(text);
        }

        function compareArrays(array1, array2, offset) {
          for (var i = 0; i < array2.length; i++) {
            if (array1[offset + i] !== array2[i]) {
              return false;
            }
          }
          return true;
        }

        function replaceArray(array, replacement, offset) {
          for (var i = 0; i < replacement.length; i++) {
            array[offset + i] = replacement[i];
          }
          for (var i = replacement.length; i < 32; i++) {
            array[offset + i] = 0;
          }
        }

        document
          .getElementById("hex-edit-form")
          .addEventListener("submit", function (e) {
            e.preventDefault();
            if (document.getElementById("file-input").files.length == 0)
              return alert(
                "Please select your " +
                  (document.getElementById("Windows").checked
                    ? "GeometryDash.exe (or similar)"
                    : document.getElementById("Android").checked
                    ? "GeometryDash.apk (or similar)"
                    : "GeometryDash.ipa (or similar)") +
                  " file."
              );
            if (document.getElementById("App Name").value == "")
              return alert("Please enter an app name. Example: mygdps");
            if (document.getElementById("Server URL").value == "")
              return alert(
                "Please enter a server URL. Example: https://gdps.km7dev.codes/database/ (needs exact letter count)"
              );
            if (
              document.getElementById("Android").checked &&
              document.getElementById("Package Name").value == ""
            )
              return alert(
                "Please enter a package name. Example: com.km7devx.geometryjump (needs exact letter count)"
              );
            var fileInput = document.getElementById("file-input");
            var file = fileInput.files[0];
            var reader = new FileReader();

            reader.onload = function (e) {
              var contents = e.target.result;
              editFile(
                contents,
                "https://www.boomlings.com/database/",
                document.getElementById("Server URL").value
              );
            };

            reader.readAsArrayBuffer(file);
          });

        document
          .getElementById("Windows")
          .addEventListener("click", function (e) {
            document.getElementById("Package Name").disabled = true;
          });

        document
          .getElementById("Android")
          .addEventListener("click", function (e) {
            document.getElementById("Package Name").disabled = false;
          });
      </script>
    </form>
  </body>
</html>
